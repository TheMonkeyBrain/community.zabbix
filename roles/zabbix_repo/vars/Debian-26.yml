---
_pre_72_deb_repo: "{{ zabbix_repo_deb_schema }}://repo.zabbix.com/zabbix/{{ zabbix_repo_version }}/unstable/{{ ansible_facts.lsb.id | default(ansible_facts['distribution']) | lower }}{% if ansible_facts['architecture'] == 'aarch64' and ansible_facts.lsb.id | default(ansible_facts['distribution']) in ['Debian', 'Ubuntu'] %}-arm64{% endif %}"
_post_72_deb_repo: "{{ zabbix_repo_deb_schema }}://repo.zabbix.com/zabbix/{{ zabbix_repo_version }}/unstable/{{ ansible_facts.lsb.id | default(ansible_facts['distribution']) | lower }}"

_zabbix_repo_deb_arch_map:
  aarch64: "arm64"
  armv6l: "armhf"
  armv7l: "armhf"
  i386: "i386"
  x86_64: "amd64"

zabbix_repo_keyring_path: /etc/apt/keyrings/
zabbix_repo_gpg_key: "{{ zabbix_repo_keyring_path }}zabbix-repo.asc"
